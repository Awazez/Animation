<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <div class="flex">
    <div class="fadeInUp" style="animation-delay:0.1s;">Everything </div>  
    <div class="fadeInUp" style="animation-delay:0.2s;">you </div>

    <div class="fadeInUp" style="animation-delay:0.3s;">need </div>

</body>

<style>
@import url('https://fonts.googleapis.com/css2?family=Raleway:wght@800&display=swap');


body{
    text-align:center;
}
.box{
    width:200px; 
    height:50px; 
    background: #ccc; 
    margin: 0 auto; 
    text-align:center; 
    line-height:50px;
}

.flex {
    display: flex;
    align-items: center;
    margin-left: 2px;
    font-family: 'Raleway', sans-serif;
    font-size: 40px;
}
.fadeInUp{
    animation:fadeInUp 0.5s ease backwards;
    margin-left: 15px;
}

@keyframes fadeInUp{
  0%{transform:translate(0px, 30px); opacity: 0;}
  100%{transform:translate(0px, 0); opacity: 1;}
}

</style>
